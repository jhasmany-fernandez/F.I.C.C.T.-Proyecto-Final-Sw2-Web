# Override para desarrollo local: monta código fuente directamente
services:
  backend:
    build:
      target: builder
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed_dev &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DEBUG: "true"

  web:
    build:
      target: builder
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 80
