# CI — Wireless HeatMapper
# Sprint 1 — DoD ítem 5: pipeline de integración continua
# Ejecuta en cada push a main/develop y en PRs hacia main.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (pytest + cobertura)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Instalar dependencias
        run: pip install --no-cache-dir ".[dev]"

      - name: Ejecutar tests con cobertura
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: backend/coverage.xml

  # ─────────────────────────────────────────────────────────────────
  web:
    name: Web (vitest + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build TypeScript + Vite
        run: npm run build

      - name: Ejecutar tests Vitest
        run: npm test
